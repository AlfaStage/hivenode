# ==============================================================================
# HiveNode Docker Compose — Desenvolvimento Local
# ==============================================================================
# Orquestra todos os microsserviços + banco de dados e cache locais.
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL (Banco de Dados Local - Desenvolvimento)
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: hivenode-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hivenode
      POSTGRES_USER: hivenode_user
      POSTGRES_PASSWORD: hivenode_dev_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hivenode-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivenode_user -d hivenode"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Redis (Cache / Filas / Comunicação - Desenvolvimento)
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hivenode-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass hivenode_redis_2026 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - hivenode-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "hivenode_redis_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Migrator: Serviço efêmero para empurrar o Prisma DB
  # ----------------------------------------------------------------------------
  migrator:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: deps
    container_name: hivenode-migrator
    command: sh -c "npx prisma generate && npx prisma db push"
    environment:
      - DATABASE_URL=postgresql://hivenode_user:hivenode_dev_2026@postgres:5432/hivenode?schema=public
    volumes:
      - ./web/prisma:/app/prisma
    networks:
      - hivenode-net
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Web: Next.js (Frontend + API)
  # ----------------------------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runner
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hivenode-web.rule=Host(`hivenode.alfastage.com.br`)"
      - "traefik.http.services.hivenode-web.loadbalancer.server.port=3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - DATABASE_URL=postgresql://hivenode_user:hivenode_dev_2026@postgres:5432/hivenode?schema=public
      - REDIS_URL=redis://:hivenode_redis_2026@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ABACATE_PAY_API_KEY=${ABACATE_PAY_API_KEY}
      - ABACATE_PAY_WEBHOOK_SECRET=${ABACATE_PAY_WEBHOOK_SECRET}
      - BROKER_API_URL=http://broker:${BROKER_SOCKS5_PORT:-10000}
      - BROKER_SOCKS_PORT=${BROKER_SOCKS5_PORT:-10000}
    networks:
      - hivenode-net
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_started

  # ----------------------------------------------------------------------------
  # Broker: Go (Motor de Rede SOCKS5 + WebSocket Tunnel)
  # ----------------------------------------------------------------------------
  broker:
    build:
      context: ./broker
      dockerfile: Dockerfile
      target: runner
    ports:
      - "${BROKER_SOCKS5_PORT:-10000}:${BROKER_SOCKS5_PORT:-10000}"
    expose:
      - "10001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hivenode-broker.rule=Host(`api.hivenode.alfastage.com.br`)"
      - "traefik.http.services.hivenode-broker.loadbalancer.server.port=10001"
    environment:
      - REDIS_URL=redis://:hivenode_redis_2026@redis:6379/0
      - SOCKS5_PORT=${BROKER_SOCKS5_PORT:-10000}
      - TUNNEL_PORT=${BROKER_TUNNEL_PORT:-10001}
      - BILLING_FLUSH_MB=${BROKER_BILLING_FLUSH_MB:-5}
      - BILLING_FLUSH_SEC=${BROKER_BILLING_FLUSH_SEC:-30}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - hivenode-net
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    name: hivenode-postgres-data
  redis_data:
    name: hivenode-redis-data

networks:
  hivenode-net:
    driver: bridge
    name: hivenode-net
